version: '3.8'
services:
  gramsetu-db:
    image: mongo:latest
    container_name: gramsetu_mongo
    ports:
      - "27077:27017" # Mapping container port 27017 to host port 27077
    networks:
      - gramsetu_network
    volumes:
      - mongo_data:/data/db

  gramsetu-api:
    build: ./server
    container_name: gramsetu_api
    ports:
      - "5055:5000" # Mapping container port 5000 to host port 5055
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://gramsetu-db:27017/digital_village
      - JWT_SECRET=gramsetu_secure_jwt_secret_2024
      - CLIENT_URL=http://localhost:5173
    networks:
      - gramsetu_network
    depends_on:
      - gramsetu-db

networks:
  gramsetu_network:
    driver: bridge

volumes:
  mongo_data:
