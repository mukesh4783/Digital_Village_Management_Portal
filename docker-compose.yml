services:
  gramsetu-api:
    build: ./server
    container_name: gramsetu_api
    ports:
      - "5055:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=gramsetu_secure_jwt_secret_2024
      - CLIENT_URL=http://localhost:5173
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - gramsetu_network

networks:
  gramsetu_network:
    driver: bridge
